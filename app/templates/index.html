<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Planos de Aula</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Smart Planner Pedagógico</h1>
    </header>

    <main id="app">
        <section id="view-list">
            <div class="actions">
                <h2>Meus Planos de Aula</h2>
                <button onclick="navigateTo('form')">+ Novo Plano</button>
            </div>
            
            <div class="filters">
                <input type="text" id="filtro-titulo" placeholder="Buscar por título...">
                <button onclick="carregarPlanos()">Buscar</button>
            </div>

            <table id="tabela-planos">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Disciplina</th>
                        <th>Data Prevista</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </section>

        <section id="view-form" class="hidden">
            <div class="actions">
                <h2 id="form-title">Cadastrar Novo Plano</h2>
                <button onclick="navigateTo('list')" class="btn-secondary">Voltar</button>
            </div>

            <form id="plano-form" onsubmit="salvarPlano(event)">
                <input type="hidden" id="plano-id">
                
                <div class="form-group">
                    <label>Título da Aula *</label>
                    <input type="text" id="titulo" required>
                </div>
                
                <div class="form-group">
                    <label>Disciplina *</label>
                    <input type="text" id="disciplina" required>
                </div>

                <div class="form-group">
                    <label>Data Prevista *</label>
                    <input type="date" id="data_prevista" required>
                </div>
                
                <div class="form-group">
                    <label>Ementa / Resumo *</label>
                    <textarea id="ementa" rows="3" required></textarea>
                </div>

                <button type="button" class="btn-ia" onclick="gerarComIA()">✨ Gerar Recomendações com IA</button>

                <div class="form-group">
                    <label>Objetivo</label>
                    <textarea id="objetivo" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Conteúdos Complementares</label>
                    <textarea id="conteudos" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Recursos de Apoio</label>
                    <textarea id="recursos_apoio" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Tags (separadas por vírgula)</label>
                    <input type="text" id="tags" placeholder="Ex: #ia, #python, #logica">
                </div>

                <button type="submit" class="btn-primary">Salvar Plano</button>
            </form>
        </section>
    </main>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p>A IA está pensando em recomendações incríveis para sua aula...</p>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
